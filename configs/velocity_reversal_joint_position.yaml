env:
  env_id: velocity_reversal
  control_level: joint_position
  control_hz: 50
  physics_hz: 500
  pd_kp: 8.0
  pd_kd: 0.8
  oscillation_hz_min: 0.3
  oscillation_hz_max: 2.0
  oscillation_amplitude: 0.22
  reward_dist_weight: 1.0
  reward_effort_weight: 0.001
  max_episode_steps: 300
 
train:
  algo: PPO
  total_timesteps: 400000
  n_envs: 8
  seed: 0
  policy: MlpPolicy
  learning_rate: 0.0003
  n_steps: 512
  batch_size: 256
 
logging:
  run_name: velreversal_joint_position_50hz
  log_dir: logs
